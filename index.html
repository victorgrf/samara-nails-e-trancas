<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samara Gabrielli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <img src="assets/header.png" alt="Cabeçalho">

        <div id="redes">
            <div class="rede" id="instagram"><a href="#">INSTAGRAM</a></div>
            <hr style="height: 5px; color: white;">
            <div class="rede" id="whatsapp"><a href="#">WHATSAPP</a></div>
        </div>

        <div id="fotos">
            <div id="column1">
                <div id="column1-row1">
                    <img src="assets/foto9.jpeg" alt="Foto de cabelo trançado">
                </div>

                <div id="column1-row2">
                    <div id="column2-row2-column1">
                        <img src="assets/foto8.jpeg" alt="Foto de unha decorada">
                    </div>
                    <div id="column2-row2-column2">
                        <img src="assets/foto3.jpeg" alt="Foto de unha decorada">
                    </div>
                </div>
            </div>

            <div id="column2">
                <img src="assets/foto4.jpeg" alt="Foto de unha decorada">
            </div>

            <div id="column3">
                <div id="column3-row1">
                    <img src="assets/foto10.jpeg" alt="Foto de cabelo trançado">
                </div>

                <div id="column3-row2">
                    <img src="assets/foto11.jpeg" alt="Foto de cabelo trançado">
                </div>
            </div>
        </div>

        <div id="precos">
            <table>
                <tr>
                    <th colspan="2">Valores das Nails</th>
                </tr>
                <tr>
                    <td>Alongamento no molde F1</td>
                    <td>R$60</td>
                </tr>
                <tr>
                    <td>Alongamento em fibra de vidro</td>
                    <td>R$75</td>
                </tr>
                <tr>
                    <td>Banho de gel</td>
                    <td>R$30</td>
                </tr>
                <tr>
                    <td>Decoração adicional</td>
                    <td>R$15</td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
